<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHGT Quotation Request</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}
.container{
max-width:600px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}
input,textarea{
width:100%;
padding:10px;
margin:10px 0;
box-sizing:border-box;
}
button{
background:#003366;
color:#fff;
padding:12px;
width:100%;
border:none;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>Quotation Request Form</h2>

<form action="https://formsubmit.co/shglobaltechnology1981@gmail.com" method="POST">

<input type="text" name="Company Name" placeholder="Company Name" required>

<input type="text" name="Contact Person" placeholder="Contact Person" required>

<input type="tel" name="Mobile" placeholder="Mobile Number" required>

<input type="email" name="Email" placeholder="Email">

<input type="text" name="Product" placeholder="Required Product">

<input type="number" name="Quantity" placeholder="Quantity">

<textarea name="Message" rows="5" placeholder="Message"></textarea>

<button type="submit">Send Quotation Request</button>

</form>

</div>

</body>
</html>
