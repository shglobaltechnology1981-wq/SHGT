<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload Product</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}
.container{
max-width:600px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
}
input,textarea{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:12px;
background:#003366;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h2>Upload Product</h2>

<input type="text" placeholder="Product Name">

<input type="number" placeholder="Price">

<textarea placeholder="Description"></textarea>

<input type="file">

<button>Upload</button>

</div>

</body>
</html>
