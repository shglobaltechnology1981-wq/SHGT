<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHGT Admin Panel</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

.box{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#0066cc;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#004999;
}

h2{
text-align:center;
}
</style>

</head>
<body>

<div class="box">

<h2>SHGT Admin Panel</h2>

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="price" placeholder="Price">

<input type="text" id="image" placeholder="Image URL">

<button onclick="saveProduct()">Save Product</button>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCHInjtT9DdKi7MxXhHbZeVBv33CCHm16A",
authDomain:"shgt-7a3f0.firebaseapp.com",
projectId:"shgt-7a3f0",
storageBucket:"shgt-7a3f0.firebasestorage.app",
messagingSenderId:"854950802466",
appId:"1:854950802466:web:192830fc835126ad2a467b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveProduct = async function(){

const name=document.getElementById("name").value;
const price=document.getElementById("price").value;
const image=document.getElementById("image").value;

await addDoc(collection(db,"products"),{
name:name,
price:price,
image:image
});

document.getElementById("msg").innerHTML="✅ Product Saved";

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("image").value="";
}

</script>

</body>
</html>
