<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHGT Products</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

header{
background:#003366;
color:#fff;
padding:20px;
text-align:center;
}

#products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
text-align:center;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#d60000;
font-size:20px;
font-weight:bold;
}

button{
background:#003366;
color:#fff;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0055aa;
}
</style>

</head>

<body>

<header>
<h1>SH GLOBAL TECHNOLOGY</h1>
<p>Sewing Machine Spare Parts Sales & Service</p>
</header>

<div id="products"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHInjtT9DdKi7MxXhHbZeVBv33CCHm16A",
  authDomain: "shgt-7a3f0.firebaseapp.com",
  projectId: "shgt-7a3f0",
  storageBucket: "shgt-7a3f0.firebasestorage.app",
  messagingSenderId: "854950802466",
  appId: "1:854950802466:web:192830fc835126ad2a467b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container=document.getElementById("products");

const querySnapshot=await getDocs(collection(db,"products"));

querySnapshot.forEach((doc)=>{

const p=doc.data();

container.innerHTML += `
<div class="card">

<img src="${p.image}" alt="Product">

<h2>${p.name}</h2>

<p>${p.description}</p>

<p class="price">৳ ${p.price}</p>

<button onclick="window.location='quotation.html'">
Request Quote
</button>

</div>
`;

});

</script>

</body>
</html>
