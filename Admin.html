<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHGT Admin Panel</title>
<style>
body{font-family:Arial;background:#f4f4f4;padding:20px;max-width:700px;margin:auto;}
h2{text-align:center;color:#003366;}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:5px;}
button{padding:12px 20px;border:none;border-radius:5px;margin:5px;cursor:pointer;}
.generate{background:#007bff;color:white;}
.copy{background:#28a745;color:white;}
pre{background:white;padding:15px;border-radius:5px;border:1px solid #ddd;white-space:pre-wrap;}
</style>
</head>
<body>

<h2>SH Global Technology Admin Panel</h2>

<input id="name" placeholder="Machine Name">
<input id="price" value="Contact Us">
<input id="image" placeholder="Image Name (example: juki-ddl900.jpg)">
<textarea id="description" placeholder="Description"></textarea>

<button class="generate" onclick="generate()">Generate</button>
<button class="copy" onclick="copyText()">Copy</button>

<pre id="output"></pre>

<script>
function generate(){
let txt=`{
  "name":"${name.value}",
  "price":"${price.value}",
  "image":"${image.value}",
  "description":"${description.value}"
},`;
output.textContent=txt;
}
function copyText(){
navigator.clipboard.writeText(output.textContent);
alert("Copied Successfully!");
}
</script>

</body>
</html>
