<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHGT Admin Dashboard</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

header{
background:#0b3d91;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.btn{
display:inline-block;
padding:10px 20px;
background:#0b3d91;
color:#fff;
text-decoration:none;
border-radius:5px;
margin:5px;
}

button{
padding:10px 20px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<header>

<h2>SHGT Admin Dashboard</h2>

<button id="logout">Logout</button>

</header>

<div class="container">

<div class="card">
<h3>Products</h3>

<a class="btn" href="add-product.html">Add Product</a>

<a class="btn" href="products.html">View Products</a>

</div>

<div class="card">
<h3>Customer Quotation</h3>

<a class="btn" href="quotation.html">View Quotation</a>

</div>

</div>

<script type="module">

import { auth } from "./js/firebase.js";

import {
signOut
}
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

document.getElementById("logout").onclick=function(){

signOut(auth).then(()=>{

window.location="admin.html";

});

}

</script>

</body>
</html>
