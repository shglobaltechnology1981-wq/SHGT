<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHGT Products</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

button{
background:#003366;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0055aa;
}
</style>

</head>

<body>

<header>
<h1>SH GLOBAL TECHNOLOGY</h1>
<p>Products</p>
</header>

<div class="container">

<div class="card">
<img src="images/single-needle.jpg" alt="Single Needle">
<h3>Single Needle Machine</h3>
<p>Industrial Sewing Machine</p>
<button>Request Quote</button>
</div>

<div class="card">
<img src="images/overlock.jpg" alt="Overlock">
<h3>Overlock Machine</h3>
<p>High Speed Overlock</p>
<button>Request Quote</button>
</div>

<div class="card">
<img src="images/spareparts.jpg" alt="Spare Parts">
<h3>Spare Parts</h3>
<p>Original Spare Parts</p>
<button>Request Quote</button>
</div>

</div>

</body>
</html>
